name: 🐛 Bug Report
description: 报告一个 Bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你报告 Bug！请填写以下信息帮助快速定位。

  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么？
      description: 描述你遇到的问题
      placeholder: "例如：运行 oc remote 后浏览器白屏"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的行为？
      description: 你期望发生什么？
      placeholder: "例如：应该看到 OneCode IDE 界面"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 你是如何触发这个 Bug 的？
      placeholder: |
        1. 运行 `oc remote`
        2. 浏览器打开 http://localhost:7681
        3. 点击 Agent 面板
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OneCode 版本
      description: 运行 `oc --version` 或查看 `agent-runtime/VERSION`
      placeholder: "0.4.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 粘贴终端输出或错误信息
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于定位问题的信息
